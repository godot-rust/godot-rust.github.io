# Zola 0.22 replaced syntect with Giallo; old theme names no longer work.
# Preview themes: https://textmate-grammars-themes.netlify.app/
[markdown.highlighting]

# Similar ones in style (old Syntect name -> Giallo name).
#theme = "dark-plus"           # charcoal (no direct equivalent)
#theme = "one-light"           # one-dark (no direct equivalent)
theme = "one-dark-pro"         # two-dark
#theme = "dracula"             # agola-dark (no direct equivalent)
#theme = "plastic"             # nyx-bold (no direct equivalent)

# Other options that might potentially fit (old syntect name -> Giallo name).
#theme = "ayu-mirage"          # ayu-mirage
#theme = "github-light"        # inspired-github
#theme = "gruvbox-dark-medium" # gruvbox-dark
#theme = "nord"                # nord
